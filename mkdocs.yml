site_name: mzPeak Specification
site_description: >-
  The mzPeak file format — a next-generation open standard for storing mass
  spectrometry spectra, chromatograms, and instrument metadata, built on Apache
  Parquet. A HUPO-PSI recommendation.
site_author: HUPO-PSI Mass Spectrometry and Proteomics Informatics Working Groups
site_url: https://hupo-psi.github.io/mzPeak-specification/

repo_name: HUPO-PSI/mzPeak-specification
repo_url: https://github.com/HUPO-PSI/mzPeak-specification
edit_uri: edit/main/docs/

copyright: >-
  Copyright &copy; 2026 HUPO Proteomics Standards Initiative (PSI) &mdash;
  released under <a href="https://creativecommons.org/licenses/by-nd/4.0/">CC-BY-ND 4.0</a>

theme:
  name: material
  language: en
  logo: assets/img/logo.svg
  favicon: assets/img/favicon.svg
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link

extra_css:
  - stylesheets/extra.css

extra:
  status:
    draft: Draft
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/HUPO-PSI/mzPeak-specification
      name: mzPeak on GitHub
    - icon: fontawesome/solid/flask
      link: https://github.com/HUPO-PSI/mzPeak
      name: Rust reference implementation

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tilde

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search

nav:
  - Home: index.md
  - Introduction:
      - Overview: introduction/overview.md
      - Motivation: introduction/motivation.md
      - Notational Conventions: introduction/conventions.md
  - Foundations:
      - Anatomy of a Parquet File: foundations/parquet.md
      - Container & Archive: foundations/container.md
  - Data Layouts:
      - Packed Parallel Metadata Tables: layouts/metadata-tables.md
      - Signal Data Model: layouts/signal-data.md
      - Point Layout: layouts/point-layout.md
      - Chunked Layout: layouts/chunked-layout.md
      - Auxiliary Data Arrays: layouts/auxiliary-arrays.md
  - Archive Organization:
      - The Index File: archive/index-file.md
      - Data Kinds: archive/data-kinds.md
      - Entity Types: archive/entity-types.md
  - File Schemas:
      - Spectra: schemas/spectra.md
      - Chromatograms: schemas/chromatograms.md
      - Wavelength Spectra: schemas/wavelength-spectra.md
  - Implementations: implementations.md
  - Tools: tools.md
  - Reference:
      - Glossary: reference/glossary.md
      - References: reference/references.md
      - Authors & Contributors: reference/authors.md
      - Intellectual Property: reference/ip-copyright.md
